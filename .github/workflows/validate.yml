name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            python3 -m json.tool "$f" > /dev/null
            echo "ok: $f"
          done

      - name: Bash syntax check on hooks
        run: |
          set -e
          for f in .claude/hooks/*.sh; do
            bash -n "$f"
            echo "ok: $f"
          done

      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Shellcheck hooks (errors only)
        run: shellcheck -S error .claude/hooks/*.sh

      - name: Verify skills have SKILL.md
        run: |
          set -e
          missing=0
          for d in .claude/skills/*/; do
            if [ ! -f "$d/SKILL.md" ]; then
              echo "missing SKILL.md in $d"
              missing=$((missing+1))
            fi
          done
          if [ $missing -gt 0 ]; then exit 1; fi
          echo "all skills have SKILL.md"

      - name: Verify agents are non-empty markdown
        run: |
          set -e
          for f in .claude/agents/*.md; do
            if [ ! -s "$f" ]; then
              echo "empty agent: $f"
              exit 1
            fi
            head -1 "$f" | grep -q '^# ' || { echo "agent missing h1: $f"; exit 1; }
            echo "ok: $f"
          done

      - name: Verify plugin manifest fields
        run: |
          python3 - <<'PY'
          import json, sys
          required = {"name", "version", "description"}
          for path in [".claude-plugin/plugin.json", ".claude-plugin/marketplace.json"]:
              data = json.load(open(path))
              if path.endswith("plugin.json"):
                  missing = required - data.keys()
                  assert not missing, f"{path} missing {missing}"
              else:
                  assert "plugins" in data, f"{path} missing 'plugins'"
                  assert isinstance(data["plugins"], list), f"{path} 'plugins' must be a list"
              print(f"ok: {path}")
          PY
